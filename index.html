<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI 赛事库 · AI Competitions Hub</title>
<meta name="description" content="汇集 AI 赛事、AI 电影节与 AI 设计类比赛的公开目录：比赛简介、官方报名入口、奖项奖金、截止时间与地区分类。共收录上千条赛事。">
<meta name="theme-color" content="#f7f0df">
<link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
<div class="app">

  <!-- ============ MASTHEAD ============ -->
  <header class="masthead">
    <div class="brand">
      <div class="brandPill">AI 赛事库</div>
      <span class="brandSub">AI COMPETITIONS HUB</span>
    </div>
    <label class="search"><span>⌕</span><input id="search" placeholder="搜索赛事名称 / 类型 / 地区 / 说明 / 官网" autocomplete="off"></label>
    <div class="mastActions">
      <button class="ghostBtn" id="filterToggle">筛选</button>
      <button class="ghostBtn" id="canvasBtn">展览画布</button>
    </div>
  </header>

  <!-- ============ HERO ============ -->
  <section class="hero paper">
    <div class="heroInner">
      <div class="heroText">
        <div class="stamp"><i></i><span>实时收录 · 比赛 / 官网 / 展示</span></div>
        <h1>AI 赛事<br>一站式目录</h1>
        <p class="lead">把 AI 创作赛事、AI 电影节与 AI 设计比赛整理成可检索的目录。每张卡片都附<b>官方报名入口</b>、<b>奖项奖金</b>、<b>截止时间</b>与<b>地区</b>——参赛、观展或研究，都能快速定位。</p>
      </div>
      <div class="heroStats" id="stats"></div>
    </div>
  </section>

  <!-- ============ COLLECTION TABS ============ -->
  <nav class="tabbar" id="tabs"></nav>

  <!-- ============ ACTIVE FILTERS ============ -->
  <section class="activeFilters" id="activeFilters" hidden></section>

  <!-- ============ RESULTS ============ -->
  <main class="content">
    <div class="contentHead">
      <h2 id="listTitle">全部赛事</h2>
      <p id="listSub"></p>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" hidden>没有符合条件的赛事，试试放宽筛选条件 🔍</div>
  </main>

  <!-- ============ FILTER DRAWER ============ -->
  <aside class="drawer" id="drawer">
    <div class="drawerHeader">
      <h3>筛选赛事</h3>
      <button class="closeDrawer" id="closeDrawer">×</button>
    </div>
    <div class="drawerBody">
      <div class="drawerSection">
        <span class="fgLabel">状态 Status</span>
        <div class="chips" id="fStatus"></div>
      </div>
      <div class="drawerSection">
        <span class="fgLabel">类型 Type</span>
        <div class="chips" id="fType"></div>
        <button class="moreBtn" id="moreType" hidden>更多 ▾</button>
      </div>
      <div class="drawerSection">
        <span class="fgLabel">地区 Region</span>
        <div class="chips" id="fRegion"></div>
        <button class="moreBtn" id="moreRegion" hidden>更多 ▾</button>
      </div>
      <div class="drawerSection">
        <span class="fgLabel">排序 Sort</span>
        <select id="sort" class="sortSel">
          <option value="deadline">截止时间 · 近→远</option>
          <option value="name">名称 · A→Z</option>
          <option value="recent">最近收录</option>
        </select>
      </div>
    </div>
    <div class="drawerFoot">
      <button class="clearBtn" id="clearBtn">清除筛选</button>
    </div>
  </aside>
  <div class="drawerOverlay" id="drawerOverlay"></div>

  <!-- ============ CANVAS / SHOWCASE ============ -->
  <section class="canvas" id="canvas">
    <div class="canvasSheet">
      <div class="canvasTop">
        <div class="canvasTitle"><h2>赛事展览画布</h2><p>拖拽移动 · 滚轮缩放 · 点击查看详情 · 全量展示</p></div>
        <div class="canvasTools">
          <button id="pauseBtn">暂停动效</button>
          <button id="resetBtn">复位视角</button>
          <button class="dark" id="exitCanvas">返回目录</button>
        </div>
      </div>
      <div class="viewport" id="viewport">
        <div class="plane" id="plane"><div class="axis h"></div><div class="axis v"></div></div>
      </div>
    </div>
  </section>

  <!-- ============ MODAL ============ -->
  <div class="modal" id="modal">
    <article class="modalCard">
      <button class="close" id="close">×</button>
      <div class="modalInfo">
        <div class="kicker" id="mKicker"></div>
        <h2 id="mTitle"></h2>
        <div class="tags" id="mTags"></div>
        <div class="specs" id="mSpecs"></div>
        <a class="modalLink" id="mLink" href="#" target="_blank" rel="noopener">前往官网 / 报名 ↗</a>
        <div id="mDescWrap" style="margin-top:16px;display:none">
          <p class="sideLabel" style="margin:0 0 8px">说明 Description</p>
          <div class="descBox" id="mDesc"></div>
        </div>
      </div>
    </article>
  </div>

  <div class="toast" id="toast">已复制</div>
</div>

<script src="data.js?v=1"></script>
<script src="app.js?v=3"></script>
</body>
</html>
